name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        env:
          VITE_BASE_PATH: /
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_API_SIGN_SECRET: ${{ vars.VITE_API_SIGN_SECRET }}
          VITE_STATIC_MODE: "false"
        run: npm run build

      - name: Scan dist for leaked secrets
        run: |
          set -e
          if find dist -name '*.map' | grep -q .; then
            echo "Source map files must not be published"
            exit 1
          fi
          if grep -R -E 'sourceMappingURL|dev-token|AKID[A-Za-z0-9]{10,}|SECRET_KEY|BEGIN PRIVATE KEY' dist/; then
            echo "Sensitive pattern found in dist/"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
